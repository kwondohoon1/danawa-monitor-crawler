name: Update laptop price CSV

on:
  schedule:
    # 22:00 UTC = 07:00 KST
    - cron: "0 22 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: danawa-data-updates
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: python -m unittest discover -s tests

  crawl:
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - part: 1
            page_start: 1
            page_end: 75
          - part: 2
            page_start: 76
            page_end: 150
          - part: 3
            page_start: 151
            page_end: 225
          - part: 4
            page_start: 226
            page_end: 300

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Crawl laptop prices part ${{ matrix.part }}
        run: >
          python scripts/crawl_danawa.py
          --category laptop
          --page-start ${{ matrix.page_start }}
          --page-end ${{ matrix.page_end }}
          --fail-on-empty
          --fetcher requests
          --delay 0.05
          --skip-combined
          --output data-part-${{ matrix.part }}

      - name: Upload laptop price part
        uses: actions/upload-artifact@v4
        with:
          name: laptop-price-part-${{ matrix.part }}
          path: data-part-${{ matrix.part }}/latest/laptop.csv
          if-no-files-found: error
          retention-days: 1

  merge:
    needs: crawl
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download laptop price parts
        uses: actions/download-artifact@v4
        with:
          pattern: laptop-price-part-*
          path: laptop-price-parts

      - name: Merge laptop price parts
        run: python scripts/merge_price_parts.py --category laptop --input-dir laptop-price-parts --output data

      - name: Commit CSV changes
        run: |
          if [[ -n "$(git status --porcelain data/latest/laptop.csv data/history/laptop_price_history.csv)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/latest/laptop.csv data/history/laptop_price_history.csv
            git commit -m "Update laptop price CSV"
            git pull --rebase origin main
            git push
          else
            echo "No laptop price changes"
          fi
