name: Update extra Danawa price CSV

on:
  schedule:
    # 23:30 UTC = 08:30 KST
    - cron: "30 23 * * *"
  workflow_dispatch:
    inputs:
      category:
        description: "Category to crawl"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - desktop
          - cpu
          - gpu
          - motherboard
          - ram
          - ssd
          - hdd
          - cooler
          - case
          - power

permissions:
  contents: write

concurrency:
  group: danawa-data-updates
  cancel-in-progress: false

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      TARGET_CATEGORY: ${{ github.event_name == 'workflow_dispatch' && inputs.category || 'all' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: python -m unittest discover -s tests

      - name: Crawl selected category prices
        run: |
          if [[ "$TARGET_CATEGORY" == "all" ]]; then
            categories=(cpu gpu motherboard ram ssd hdd cooler case power)
          else
            categories=("$TARGET_CATEGORY")
          fi

          args=()
          for category in "${categories[@]}"; do
            args+=(--category "$category")
          done

          python scripts/crawl_danawa.py "${args[@]}" --fail-on-empty --fetcher requests --max-pages 100 --delay 0.1 --skip-combined

          python scripts/update_new_products.py "${args[@]}"

      - name: Commit CSV changes
        run: |
          if [[ "$TARGET_CATEGORY" == "all" ]]; then
            categories=(cpu gpu motherboard ram ssd hdd cooler case power)
            commit_message="Update PC parts price CSV"
          else
            categories=("$TARGET_CATEGORY")
            commit_message="Update Danawa ${TARGET_CATEGORY} price CSV"
          fi

          paths=()
          for category in "${categories[@]}"; do
            paths+=("data/latest/${category}.csv" "data/history/${category}_price_history.csv" "data/new_products/${category}.csv")
          done

          if [[ -n "$(git status --porcelain -- "${paths[@]}")" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -- "${paths[@]}"
            git commit -m "$commit_message"
            git pull --rebase origin main
            git push
          else
            echo "No CSV changes"
          fi
