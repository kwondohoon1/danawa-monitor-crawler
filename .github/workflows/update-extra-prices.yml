name: Update extra Danawa price CSV

on:
  workflow_dispatch:
    inputs:
      category:
        description: "Category to crawl"
        required: true
        default: "desktop"
        type: choice
        options:
          - desktop

permissions:
  contents: write

concurrency:
  group: danawa-data-updates
  cancel-in-progress: false

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: python -m unittest discover -s tests

      - name: Crawl selected category prices
        run: python scripts/crawl_danawa.py --category "${{ inputs.category }}" --fail-on-empty --fetcher requests --max-pages 100 --delay 0.1 --skip-combined

      - name: Commit CSV changes
        run: |
          csv_path="data/latest/${{ inputs.category }}.csv"
          history_path="data/history/${{ inputs.category }}_price_history.csv"
          if [[ -n "$(git status --porcelain "$csv_path" "$history_path")" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add "$csv_path" "$history_path"
            git commit -m "Update Danawa ${{ inputs.category }} price CSV"
            git pull --rebase origin main
            git push
          else
            echo "No CSV changes"
          fi
