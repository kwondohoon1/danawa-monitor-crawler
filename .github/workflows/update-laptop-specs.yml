name: Update laptop specs CSV

on:
  schedule:
    # 03:00 UTC = 12:00 KST
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: danawa-data-updates
  cancel-in-progress: false

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: python -m unittest discover -s tests

      - name: Crawl laptop specs
        run: |
          if [[ ! -f data/latest/laptop.csv ]]; then
            echo "No laptop price CSV yet"
            exit 0
          fi
          python scripts/crawl_laptop_specs.py --workers 32 --timeout 20 --retries 3 --fail-on-error

      - name: Commit CSV changes
        run: |
          if [[ -n "$(git status --porcelain data/specs/laptop_specs.csv)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/specs/laptop_specs.csv
            git commit -m "Update laptop specs CSV"
            git pull --rebase origin main
            git push
          else
            echo "No laptop specs changes"
          fi
