name: Update Danawa price CSV

on:
  schedule:
    # 00:00 UTC = 09:00 KST
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Set up Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: python -m unittest discover -s tests

      - name: Crawl Danawa
        run: python scripts/crawl_danawa.py --fail-on-empty --fetcher requests --max-pages 100 --delay 0.05

      - name: Commit CSV changes
        run: |
          if [[ -n "$(git status --porcelain data)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data
            git commit -m "Update Danawa price CSV"
            git push
          else
            echo "No CSV changes"
          fi
