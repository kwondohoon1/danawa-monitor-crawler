name: Update Danawa price CSV

on:
  schedule:
    # 00:00 UTC = 09:00 KST
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: danawa-data-updates
  cancel-in-progress: false

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: python -m unittest discover -s tests

      - name: Crawl monitor prices
        run: python scripts/crawl_danawa.py --category monitor --fail-on-empty --fetcher requests --max-pages 100 --delay 0.1 --skip-combined

      - name: Commit CSV changes
        run: |
          if [[ -n "$(git status --porcelain data/latest/monitor.csv)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/latest/monitor.csv
            git commit -m "Update Danawa price CSV"
            git pull --rebase origin main
            git push
          else
            echo "No CSV changes"
          fi
