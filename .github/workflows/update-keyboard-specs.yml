name: Update keyboard specs CSV

on:
  schedule:
    # 19:00 UTC = 04:00 KST
    - cron: "0 19 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: danawa-data-updates
  cancel-in-progress: false

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: python -m unittest discover -s tests

      - name: Crawl keyboard specs
        run: python scripts/crawl_keyboard_specs.py --workers 32 --timeout 20 --retries 3 --fail-on-error

      - name: Commit CSV changes
        run: |
          if [[ -n "$(git status --porcelain data/specs/keyboard_specs.csv)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/specs/keyboard_specs.csv
            git commit -m "Update keyboard specs CSV"
            git pull --rebase origin main
            git push
          else
            echo "No keyboard specs changes"
          fi
